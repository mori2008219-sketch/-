<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自己紹介ページ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        img.profile {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4CAF50;
        }
        h1 {
            color: #333;
            margin-top: 15px;
        }
        p {
            color: #555;
            line-height: 1.6;
        }
        .social-links a {
            margin: 0 10px;
            text-decoration: none;
            color: #4CAF50;
            font-weight: bold;
        }
        .social-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="karaage.png
    " alt="プロフィール画像" class="profile">
    <h1>森田　一楓</h1>
    <p>
        初めまして!Web開発とデザインが大好きな一般人です。<br>
        HTML/CSS/JavaScriptを中心に学習中で、趣味はゲームと読書です。
    </p>
    <div class="social-links">
        <a href="https://twitter.com/" target="_blank">Twitter</a>
        <a href="https://github.com/" target="_blank">GitHub</a>
        <a href="mailto:example@example.com">Email</a>
    </div>
</div>

</body>
</html>
